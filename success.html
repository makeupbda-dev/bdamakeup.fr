<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message Envoyé — BDA Makeup</title>
  <style>
    body {
      background-color: #0a0a0a;
      color: #f5f0eb;
      font-family: 'Montserrat', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
      padding: 20px;
    }
    h1 { color: #c9a96e; font-family: 'Playfair Display', serif; font-size: 2.5rem; }
    p { color: #888888; margin-bottom: 2rem; }
    a {
      color: #0a0a0a;
      background: #c9a96e;
      padding: 10px 25px;
      text-decoration: none;
      text-transform: uppercase;
      font-size: 0.8rem;
      letter-spacing: 2px;
      transition: 0.3s;
    }
    a:hover { background: #e2c891; }
  </style>
</head>
<body>
  <h1>Merci pour votre message !</h1>
  <p>Votre demande a bien été envoyée. Je vous recontacterai très vite.</p>
  <a href="/">Retour à l'accueil</a>
</body>
</html>
